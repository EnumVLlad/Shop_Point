---
openapi: 3.0.1
info:
  title: Shop Point API
  version: v1
paths:
  "/api/v1/transactions":
    post:
      summary: Processes a purchase transaction and applies loyalty points
      tags:
      - Transactions
      parameters: []
      responses:
        '201':
          description: transaction processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction:
                    type: object
                    properties:
                      id:
                        type: integer
                      order_number:
                        type: string
                      purchase_amount:
                        type: string
                      eligible_amount:
                        type: string
                      redeemed_points:
                        type: integer
                      points:
                        type: integer
                      status:
                        type: string
                    required:
                    - id
                    - order_number
                    - purchase_amount
                    - eligible_amount
                    - redeemed_points
                    - points
                    - status
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      points_balance:
                        type: integer
                      tier_points:
                        type: integer
                    required:
                    - id
                    - points_balance
                    - tier_points
                required:
                - transaction
                - user
        '422':
          description: transaction validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction:
                  type: object
                  properties:
                    user_id:
                      type: integer
                    amount:
                      type: number
                      format: float
                    redeemed_points:
                      type: integer
                    order_number:
                      type: string
                    description:
                      type: string
                  required:
                  - user_id
                  - amount
                  - order_number
              required:
              - transaction
servers:
- url: http://localhost:3000
  description: Development server
components:
  schemas:
    error:
      type: object
      properties:
        error:
          type: string
      required:
      - error
